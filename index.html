<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0a0f0a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <title>Smoke420 POS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- ── Login Screen ───────────────────────────────────────────────────────── -->
  <div id="login-screen"></div>

  <!-- ── App Screen ────────────────────────────────────────────────────────── -->
  <div id="app-screen" class="hidden">

    <!-- Top Status Bar -->
    <div id="top-bar"></div>

    <!-- Tab Navigation -->
    <div id="tab-nav"></div>

    <!-- Main Content -->
    <div id="content"></div>

    <!-- Bottom Status Bar -->
    <div id="bottom-bar">
      <span id="sync-status"><span class="status-dot dim">●</span> OFFLINE</span>
      <span id="session-info"></span>
      <span style="margin-left:auto" id="last-sync-time">NOT SYNCED</span>
    </div>

    <!-- Function Key Bar -->
    <div id="fn-bar"></div>

  </div>

  <!-- ── Toast Notifications ────────────────────────────────────────────────── -->
  <div id="toast-container"></div>

  <!-- ── Scripts (load order matters — no bundler) ─────────────────────────── -->
  <script src="config.js"></script>
  <script src="js/data.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/sales.js"></script>
  <script src="js/inventory.js"></script>
  <script src="js/customers.js"></script>
  <script src="js/reports.js"></script>
  <script src="js/admin.js"></script>

  <!-- ── Bootstrap ──────────────────────────────────────────────────────────── -->
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      // Initialise data layer (seeds if fresh install)
      Data.init();

      // Restore last sync timestamp
      const lastSync = Data.lsGet(CONFIG.KEYS.LAST_SYNC);
      if (lastSync) App.lastSyncTime = lastSync;

      // Start UI clock
      UI.init();

      // Fetch staff PINs from Sheets before showing login —
      // ensures any device can log in without going through setup wizard again
      await Data.fetchStaffFromSheets();

      // Determine starting state
      if (Auth.isLoggedIn()) {
        Auth.startWatchdog();
        UI.showApp();
      } else {
        Auth.showLoginScreen();
      }

      // Process any queued syncs from previous session
      Data.processQueue();
    });
  </script>

</body>
</html>
